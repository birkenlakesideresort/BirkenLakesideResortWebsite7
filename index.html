    #loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #080D09; z-index: 9999;
      opacity: 1; transition: opacity 0.45s ease;
      padding: 0 clamp(24px,5vw,80px) 72px;
    }
    #loader.is-fading { opacity: 0; pointer-events: none; }
    .bl-inner {
      display: flex; align-items: center;
      gap: clamp(28px,5.5vw,72px); width: 100%; max-width: 860px;
    }
    .bl-text { display: flex; flex-direction: column; gap: 6px; }
    .bl-birken {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px,13vw,156px); font-weight: 400;
      letter-spacing: 0.03em; line-height: 0.88; color: #1D3D2D;
    }
    .bl-lakeside {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px,3.2vw,40px); letter-spacing: 0.35em; color: #C4743A;
    }
    .bl-since {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(11px,1.6vw,18px); letter-spacing: 0.34em; color: #C4743A;
      display: flex; align-items: center; gap: 9px; margin-top: 4px;
    }
    .bl-since-rule {
      display: inline-block; height: 1px; width: clamp(20px,3vw,40px);
      background: #C4743A; opacity: 0.6;
    }
    .bl-illustration { flex: 0 0 auto; width: clamp(160px,28vw,320px); }
    .bl-illustration svg { width: 100%; height: auto; }
    .bl-footer {
      position: absolute; bottom: 32px; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .bl-bar-track {
      width: clamp(160px,40vw,320px); height: 1px;
      background: rgba(196,116,58,0.18);
    }
    .bl-bar-fill {
      height: 100%; background: #C4743A;
      animation: bl-load 2.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    }
    @keyframes bl-load {
      0%   { width: 0; }
      60%  { width: 70%; }
      85%  { width: 88%; }
      100% { width: 100%; }
    }
    #loader-status {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(10px,1.3vw,14px); letter-spacing: 0.28em;
      color: rgba(196,116,58,0.55);
    }
    @media (max-width: 520px) {
      .bl-illustration { display: none; }
      .bl-birken { font-size: clamp(64px,18vw,120px); }
    }
    @media (prefers-reduced-motion: reduce) {
      #loader { transition: none; }
      .bl-bar-fill { animation: none; width: 50%; opacity: 0.55; }
    }
  </style>
